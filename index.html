<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <div class="titulo">
        <div class="espaciado"></div>
        <h1>TRIVIAL</h1>
        <img src="/trivial_LM/img/trivial-removebg-preview.png">
    </div>

    <p id="marcador">Puntuación: 0 / 100</p>
    <button onclick="localStorage.setItem('puntos','0'); document.getElementById('marcador').textContent='Puntuación: 0 / 100'">Reiniciar</button>
</header>
        

        <div class="contenedor-trivial">
            <a href="azul.html" class="ficha f-geografia">
                <span>Geografía</span>
            </a>
  
            <a href="amarillo.html" class="ficha f-historia">
                <span>Historia</span>
            </a>
  
            <a href="morado.html" class="ficha f-arte">
                <span>Arte</span>
            </a>
  
            <a href="verde.html" class="ficha f-ciencia">
                <span>Ciencia y Naturaleza</span>
            </a>
  
            <a href="naranja.html" class="ficha f-deportes">
                <span>Deportes</span>
            </a>
  
            <a href="rosa.html" class="ficha f-entretenimiento">
                <span>Entretenimiento</span>
            </a>
        </div>


    </header>
<script>
    let pts = parseFloat(localStorage.getItem('puntos') || '0');
    document.getElementById('marcador').textContent = 'Puntuación: ' + pts.toFixed(1) + ' / 100';
    if (pts >= 100) alert('🎉 ¡Enhorabuena! ¡Has ganado con 100 puntos!');
</script>
</body>
</html>
