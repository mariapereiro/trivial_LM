<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoría: Geografía</title>
    <link rel="stylesheet" href="style.css">

</head>
<body id="body_azul">

    <p id="marcador">Puntuación: 0 / 100</p>
    <header>
        <div class="azul_header">
            <h1>PREGUNTA</h1>
        </div>
    </header>

    <main>
        <div id="azul-pregunta-container">
            <p id="azul-pregunta-texto">Pegunta</p>
             <div id="azul-pregunta-info">
                <span id="azul-categoria"></span>
                <span id="azul-dificultad"></span>
            </div>
            <ul id="respuesta-lista"></ul>

        </div>
    </main>


<script>
        async function mostrarPregunta() {
        try {
            let respuesta = await fetch("https://opentdb.com/api.php?amount=10&category=22"); 
            let datos = await respuesta.json();
            let h=datos.results[0];
            
            //Poner la pregunta en el HTML
            document.getElementById("azul-pregunta-texto").innerHTML = h.question;
            document.getElementById("azul-categoria").innerHTML="Categoría: "+h.category;
            document.getElementById("azul-dificultad").innerHTML="Dificultad: "+h.difficulty;

            //Random de respuestas
            let opciones=[];

            for(let incorrecta of h.incorrect_answers){
                opciones.push(incorrecta);
            }

            opciones.push(h.correct_answer);
            opciones.sort(() => Math.random() - 0.5);

            const letras=["a","b","c","d"];
            const lista = document.getElementById("respuesta-lista");

            opciones.forEach((opcion, i) => {
                let li=document.createElement("li");
                li.textContent = letras[i] + ") " + opcion;
                li.onclick = () => {
                let pts = parseFloat(localStorage.getItem('puntos') || '0');
                    if (opcion === h.correct_answer) pts += 16.7;
                    localStorage.setItem('puntos', pts.toFixed(1));
                    window.location.href = 'index.html';
                };
                lista.appendChild(li);
            });


        } catch (error) {
            console.log("Error: ", error);
        }
        }

document.getElementById('marcador').textContent = 'Puntuación: ' + (localStorage.getItem('puntos') || '0') + ' / 100';
mostrarPregunta();
</script>
</body>
</html>
